{% extends 'layouts/base.html' %}

{% block title %}Password Reset Sent - Campus Flow{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card animate-fade-in-up">
        <div class="text-center">
            <i class="fas fa-envelope fa-3x text-success mb-3"></i>
            <h2 class="fw-bold">Check Your Email</h2>
            <p class="text-muted">We've sent you a password reset link. Please check your email and follow the instructions.</p>
            <div class="mt-4">
                <a href="{% url 'login' %}" class="btn btn-primary">Back to Login</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
