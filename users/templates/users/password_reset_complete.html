{% extends 'layouts/base.html' %}

{% block title %}Password Reset Complete - Campus Flow{% endblock %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card animate-fade-in-up">
        <div class="text-center">
            <i class="fas fa-check-circle fa-3x text-success mb-3"></i>
            <h2 class="fw-bold">Password Reset Complete</h2>
            <p class="text-muted">Your password has been successfully reset. You can now log in with your new password.</p>
            <div class="mt-4">
                <a href="{% url 'login' %}" class="btn btn-primary btn-lg">Log In</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
