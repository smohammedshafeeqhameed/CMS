{% extends 'layouts/modern_dashboard_base.html' %}

{% block title %}Decommission Timetable - EduPulse Pro{% endblock %}

{% block content %}
<div class="animate-fade-in max-w-2xl mx-auto py-20">
    <div class="glass-card rounded-[2.5rem] border border-rose-200 dark:border-rose-900/30 shadow-2xl overflow-hidden">
        <div class="p-10 text-center space-y-6">
            <div class="size-20 rounded-full bg-rose-500/10 text-rose-500 flex items-center justify-center mx-auto border border-rose-500/20">
                <span class="material-symbols-outlined text-4xl">warning</span>
            </div>
            
            <div class="space-y-2">
                <h2 class="text-3xl font-black italic tracking-tight">Neutralize <span class="text-rose-500">Document</span>?</h2>
                <p class="text-slate-500 font-medium font-italic">You are about to permanently delete the timetable artifact: <br><span class="font-black text-slate-800 dark:text-white">"{{ object.title }}"</span></p>
            </div>

            <form method="post" class="pt-6 flex flex-col sm:flex-row items-center gap-4">
                {% csrf_token %}
                <button type="submit" class="w-full sm:flex-1 py-5 bg-rose-500 text-white rounded-2xl font-black uppercase tracking-widest shadow-xl shadow-rose-500/30 hover:scale-105 transition-all flex items-center justify-center gap-3">
                    <span class="material-symbols-outlined">delete_forever</span>
                    Confirm Deletion
                </button>
                <a href="{% url 'timetable_doc_list' %}" class="w-full sm:px-10 py-5 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 rounded-2xl font-black uppercase tracking-widest text-center hover:bg-slate-200 transition-all">
                    Abort
                </a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
